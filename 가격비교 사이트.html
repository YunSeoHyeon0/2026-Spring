<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑몰 가격 비교 앱</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --good: #059669;
      --bad: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 40px auto 60px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 28px;
    }

    .hero-main h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
    }

    .hero-main p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .stats {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .stat-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fcfdff;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.04s ease, opacity 0.2s ease;
    }

    button:active { transform: translateY(1px); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .danger {
      background: #fef2f2;
      color: var(--bad);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 220px 140px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fbff 100%);
      border: 1px solid #dbeafe;
      color: #1d4ed8;
      font-size: 14px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    thead th {
      background: #f8fafc;
      color: #475569;
      font-size: 13px;
    }

    tbody tr:hover {
      background: #fafcff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .lowest {
      background: #ecfdf5;
      color: var(--good);
    }

    .highest {
      background: #fef2f2;
      color: var(--bad);
    }

    .price {
      font-weight: 700;
      white-space: nowrap;
    }

    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fafafa;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      th:nth-child(5), td:nth-child(5) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="card hero-main">
        <h1>같은 상품, 어디가 제일 쌀까?</h1>
        <p>
          쇼핑몰별 가격을 직접 입력해서 같은 상품의 최저가와 최고가를 한눈에 비교할 수 있는 간단한 HTML 앱입니다.
          데이터는 브라우저에 자동 저장되며, 검색·정렬·필터 기능도 포함되어 있습니다.
        </p>
      </div>
      <div class="card stats">
        <div class="stat-box">
          <div class="stat-label">등록된 상품 수</div>
          <div class="stat-value" id="productCount">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">등록된 가격 정보 수</div>
          <div class="stat-value" id="entryCount">0</div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="card panel">
        <h2>가격 정보 입력</h2>
        <form id="priceForm">
          <div class="field">
            <label for="product">상품명</label>
            <input id="product" type="text" placeholder="예: 에어팟 프로 2" required />
          </div>
          <div class="field">
            <label for="store">쇼핑몰명</label>
            <input id="store" type="text" placeholder="예: 쿠팡 / 11번가 / 네이버스토어" required />
          </div>
          <div class="field">
            <label for="price">가격(원)</label>
            <input id="price" type="number" min="0" step="1" placeholder="예: 289000" required />
          </div>
          <div class="field">
            <label for="url">상품 링크 (선택)</label>
            <input id="url" type="url" placeholder="https://..." />
          </div>
          <div class="actions">
            <button type="submit" class="primary">추가하기</button>
            <button type="button" class="secondary" id="fillSampleBtn">샘플 데이터 넣기</button>
            <button type="button" class="danger" id="resetBtn">전체 삭제</button>
          </div>
        </form>
        <div class="hint">
          같은 상품명을 입력하면 여러 쇼핑몰 가격이 자동으로 한 그룹으로 묶여 비교됩니다.
        </div>
      </div>

      <div class="card panel">
        <h2>가격 비교</h2>
        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="상품명 또는 쇼핑몰 검색" />
          <select id="productFilter">
            <option value="all">전체 상품 보기</option>
          </select>
          <select id="sortSelect">
            <option value="priceAsc">가격 낮은순</option>
            <option value="priceDesc">가격 높은순</option>
            <option value="productAsc">상품명순</option>
          </select>
        </div>

        <div class="summary" id="summaryBox">
          아직 데이터가 없습니다. 왼쪽에서 가격 정보를 추가해보세요.
        </div>

        <div id="tableWrap"></div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "shopping_price_compare_data_v1";

    const sampleData = [
      { product: "에어팟 프로 2", store: "쿠팡", price: 298000, url: "" },
      { product: "에어팟 프로 2", store: "11번가", price: 289000, url: "" },
      { product: "에어팟 프로 2", store: "네이버스토어", price: 301500, url: "" },
      { product: "닌텐도 스위치 OLED", store: "G마켓", price: 382000, url: "" },
      { product: "닌텐도 스위치 OLED", store: "SSG", price: 395000, url: "" },
      { product: "닌텐도 스위치 OLED", store: "쿠팡", price: 378000, url: "" },
      { product: "다이슨 에어랩", store: "롯데ON", price: 629000, url: "" },
      { product: "다이슨 에어랩", store: "공식몰", price: 649000, url: "" }
    ];

    const form = document.getElementById("priceForm");
    const productInput = document.getElementById("product");
    const storeInput = document.getElementById("store");
    const priceInput = document.getElementById("price");
    const urlInput = document.getElementById("url");
    const searchInput = document.getElementById("searchInput");
    const productFilter = document.getElementById("productFilter");
    const sortSelect = document.getElementById("sortSelect");
    const tableWrap = document.getElementById("tableWrap");
    const summaryBox = document.getElementById("summaryBox");
    const fillSampleBtn = document.getElementById("fillSampleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const productCount = document.getElementById("productCount");
    const entryCount = document.getElementById("entryCount");

    let items = loadData();

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch {
        return [];
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function formatPrice(num) {
      return new Intl.NumberFormat("ko-KR").format(num) + "원";
    }

    function normalizeText(text) {
      return String(text).trim().toLowerCase();
    }

    function getUniqueProducts() {
      return [...new Set(items.map(item => item.product.trim()))].sort((a, b) => a.localeCompare(b, "ko"));
    }

    function updateFilterOptions() {
      const current = productFilter.value;
      const options = ["<option value=\"all\">전체 상품 보기</option>"];
      getUniqueProducts().forEach(product => {
        options.push(`<option value="${escapeHtml(product)}">${escapeHtml(product)}</option>`);
      });
      productFilter.innerHTML = options.join("");
      if ([...productFilter.options].some(opt => opt.value === current)) {
        productFilter.value = current;
      }
    }

    function getProductStats(productName) {
      const group = items.filter(item => item.product === productName);
      if (!group.length) return null;
      const prices = group.map(item => Number(item.price));
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      return { min, max, diff: max - min };
    }

    function getFilteredItems() {
      const keyword = normalizeText(searchInput.value);
      const selectedProduct = productFilter.value;

      let filtered = items.filter(item => {
        const matchesKeyword = !keyword ||
          normalizeText(item.product).includes(keyword) ||
          normalizeText(item.store).includes(keyword);

        const matchesProduct = selectedProduct === "all" || item.product === selectedProduct;
        return matchesKeyword && matchesProduct;
      });

      const sortMode = sortSelect.value;
      filtered.sort((a, b) => {
        if (sortMode === "priceAsc") return a.price - b.price;
        if (sortMode === "priceDesc") return b.price - a.price;
        return a.product.localeCompare(b.product, "ko") || a.store.localeCompare(b.store, "ko");
      });

      return filtered;
    }

    function renderSummary(filtered) {
      if (!items.length) {
        summaryBox.textContent = "아직 데이터가 없습니다. 왼쪽에서 가격 정보를 추가해보세요.";
        return;
      }

      if (!filtered.length) {
        summaryBox.textContent = "현재 조건에 맞는 결과가 없습니다. 검색어나 필터를 바꿔보세요.";
        return;
      }

      const productNames = [...new Set(filtered.map(item => item.product))];
      const comparisons = productNames
        .map(name => ({ name, ...getProductStats(name) }))
        .filter(Boolean)
        .sort((a, b) => b.diff - a.diff);

      const bestGap = comparisons[0];
      if (bestGap && bestGap.diff > 0) {
        summaryBox.innerHTML = `현재 <strong>${escapeHtml(productNames.length.toString())}개 상품</strong>의 가격을 비교 중입니다. 가장 가격 차이가 큰 상품은 <strong>${escapeHtml(bestGap.name)}</strong>이며, 쇼핑몰별 차이는 <strong>${formatPrice(bestGap.diff)}</strong>입니다. 최저가는 <strong>${formatPrice(bestGap.min)}</strong>, 최고가는 <strong>${formatPrice(bestGap.max)}</strong>입니다.`;
      } else {
        summaryBox.innerHTML = `현재 <strong>${escapeHtml(productNames.length.toString())}개 상품</strong>의 가격을 비교 중입니다. 선택된 상품들은 아직 가격 차이가 거의 없거나 1개 쇼핑몰만 등록되어 있습니다.`;
      }
    }

    function renderTable() {
      updateFilterOptions();
      productCount.textContent = getUniqueProducts().length;
      entryCount.textContent = items.length;

      const filtered = getFilteredItems();
      renderSummary(filtered);

      if (!filtered.length) {
        tableWrap.innerHTML = '<div class="empty">표시할 가격 정보가 없습니다.</div>';
        return;
      }

      const rows = filtered.map((item, index) => {
        const stats = getProductStats(item.product);
        const isLowest = stats && item.price === stats.min;
        const isHighest = stats && item.price === stats.max && stats.max !== stats.min;

        let badge = "";
        if (isLowest) badge = '<span class="badge lowest">최저가</span>';
        else if (isHighest) badge = '<span class="badge highest">최고가</span>';

        const linkCell = item.url
          ? `<a href="${escapeAttribute(item.url)}" target="_blank" rel="noopener noreferrer">바로가기</a>`
          : "-";

        return `
          <tr>
            <td>${escapeHtml(item.product)}</td>
            <td>${escapeHtml(item.store)}</td>
            <td class="price">${formatPrice(item.price)}</td>
            <td>${badge || "-"}</td>
            <td>${linkCell}</td>
            <td><button class="danger" onclick="removeItem(${index})">삭제</button></td>
          </tr>
        `;
      }).join("");

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>상품명</th>
              <th>쇼핑몰</th>
              <th>가격</th>
              <th>비교 결과</th>
              <th>링크</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const newItem = {
        product: productInput.value.trim(),
        store: storeInput.value.trim(),
        price: Number(priceInput.value),
        url: urlInput.value.trim()
      };

      if (!newItem.product || !newItem.store || !Number.isFinite(newItem.price) || newItem.price < 0) {
        alert("상품명, 쇼핑몰명, 가격을 올바르게 입력해주세요.");
        return;
      }

      items.push(newItem);
      saveData();
      form.reset();
      renderTable();
      productInput.focus();
    });

    fillSampleBtn.addEventListener("click", () => {
      if (items.length && !confirm("현재 데이터에 샘플 데이터를 추가할까요?")) return;
      items = [...items, ...sampleData];
      saveData();
      renderTable();
    });

    resetBtn.addEventListener("click", () => {
      if (!items.length) return;
      if (!confirm("정말로 모든 가격 정보를 삭제할까요?")) return;
      items = [];
      saveData();
      renderTable();
    });

    searchInput.addEventListener("input", renderTable);
    productFilter.addEventListener("change", renderTable);
    sortSelect.addEventListener("change", renderTable);

    window.removeItem = function(filteredIndex) {
      const filtered = getFilteredItems();
      const target = filtered[filteredIndex];
      if (!target) return;
      const actualIndex = items.findIndex(item =>
        item.product === target.product &&
        item.store === target.store &&
        item.price === target.price &&
        item.url === target.url
      );
      if (actualIndex > -1) {
        items.splice(actualIndex, 1);
        saveData();
        renderTable();
      }
    };

    renderTable();
  </script>
</body>
</html>
